name: Claude Test Plan

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: string
      asana_url:
        description: Optional Asana task URL (used for links). Empty to skip Asana.
        required: false
        type: string
        default: ''
      asana_gid:
        description: Resolved Asana parent task gid (the caller resolves this). Empty if none.
        required: false
        type: string
        default: ''
      asana_task_name:
        description: Pre-fetched Asana task name (the caller resolves this). Empty if none.
        required: false
        type: string
        default: ''
      asana_task_notes:
        description: Pre-fetched Asana task notes/description (the caller resolves this).
        required: false
        type: string
        default: ''
    secrets:
      anthropic_api_key:
        required: true
      asana_token:
        description: Asana Personal Access Token. Required only when asana_gid is provided.
        required: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        env:
          ASANA_TOKEN: ${{ secrets.asana_token }}
        with:
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
          github_token: ${{ github.token }}
          prompt: |
            Generate a QA test plan for PR #${{ inputs.pr_number }}. Audience: QA testers,
            including juniors who may not be familiar with the feature. Where the finished
            plan is published depends on whether an Asana task was provided (see Step 3).

            Step 0 — Optional Asana task context (already fetched for you by the caller):
              Asana parent task gid (may be empty): ${{ inputs.asana_gid }}
              Asana task URL  (may be empty): ${{ inputs.asana_url }}
              Asana task name (may be empty): ${{ inputs.asana_task_name }}
              Asana task notes (may be empty, may span multiple lines):
              ${{ inputs.asana_task_notes }}

              If a task name and/or notes are provided above, use them to understand the
              intent and acceptance criteria — sharpen "What we're testing" and surface edge
              cases the diff alone wouldn't reveal. If they are empty, build the plan from
              the PR diff alone and do not mention any missing Asana context in the comment.

            Step 1 — Read PR context:
              gh pr view ${{ inputs.pr_number }} --json title,body,headRefName,baseRefName,files,url
              gh pr diff ${{ inputs.pr_number }}

              If the diff is large, focus on files most likely to have user-facing impact
              (views/blade templates, REST responses, app payloads). Skim infra files.

            Step 2 — Compose the test plan using EXACTLY this structure (shown as Markdown;
            Step 3 CASE A converts it to Asana HTML, CASE B keeps it as Markdown):

            > 🤖 **Draft test plan — review before use.** This was auto-generated from the
            > PR diff as a starting point. The developer should review it thoroughly for
            > accuracy and completeness before handing the task off to QA.
            >
            > PR: [<the PR title>](<the PR url from `gh pr view` above>)
            > <If an Asana task name was provided in Step 0, add a second line:
            >  "Asana: [<asana_task_name>](<asana_url>)". Omit this line entirely if no
            >  Asana task name was provided.>

            ## What we're testing
            One sentence in plain language describing what changed from a user's
            perspective. NO implementation jargon (avoid "meta keys", "hooks", "REST
            fields", "ACF", schema names, etc.). Frame as: what should the user notice or
            be able to do that they couldn't before?

            ## Setup
            - Bullet points: required account types, test data, feature flag states,
              app builds, browser, etc. Be specific about what to prepare.

            ## Scenario 1: <short user-facing title, e.g. "Free user hits paywall">
            1. <first action the tester takes>
               - <what they should see immediately>
            2. <next action>
               - <what they should see>
            (Continue with numbered steps; each step gets its expected result as an indented
            bullet directly underneath, not at the end.)

            ## Scenario 2: <next workflow, only if a distinct second flow exists>
            ...

            ## Edge cases worth checking
            - <single-line description of an edge case to verify>
            - <another edge case>

            Rules — do not violate:
            - Frame every scenario from the user's POV ("As a logged-out visitor, I tap…"),
              never the engineer's ("the paywall_status meta returns true").
            - Pair each numbered step with its expected result as an indented bullet
              directly below — never group expected results at the bottom of a scenario.
            - Only generate scenarios for behavior the diff actually changes. Don't pad
              with tests for unchanged code.
            - Avoid vague phrases like "should work" or "behaves correctly." State the
              specific UI element, copy, value, or page that should appear.
            - Keep it tight. The whole comment should fit in one screen for most PRs.
            - Always begin the comment with the draft-review disclaimer callout above,
              including in the infrastructure-only case below.
            - If the PR is purely infrastructure / dev tooling / refactor with no
              user-visible change, write just the disclaimer and the "What we're testing"
              section saying that, list any internal-only verification steps, and skip
              user scenarios.

            Step 3 — Write the plan to files. Do NOT post anything and do NOT call gh, curl,
            or the Asana API — later workflow steps publish these files. Always use the Write
            tool (never build file bodies inline in a shell command, which drops characters).

              ALWAYS write the COMPLETE Markdown plan from Step 2 to:
                /tmp/test-plan.md

              ADDITIONALLY, if the Asana parent task gid in Step 0 is NON-empty, also write an
              Asana rich-text version of the SAME plan to:
                /tmp/test-plan.html
              Asana descriptions are NOT Markdown — use only Asana's supported tags:
                - Wrap everything in a single <body>…</body>.
                - Allowed tags ONLY: <h1> <h2> <ul> <ol> <li> <strong> <em> <u> <s> <code>
                  <a href> <hr/>. Use <h2> for the "## ..." section headers, <ol><li> for
                  numbered steps, nested <ul><li> for expected results.
                - Render the draft-review disclaimer as the first paragraph in <strong>.
                - Do NOT use Markdown symbols (##, -, ✅, >) inside the HTML.
                - It MUST be well-formed XHTML — Asana rejects invalid XML with HTTP 400.
                  ESCAPE every literal &, <, > in text as &amp; &lt; &gt; (e.g. write
                  "GPA &lt; 3.0" and "Undergrads &amp; GPA"). Self-close void tags as <hr/>.
                  Close every tag and nest correctly.
                - Do NOT use any tag outside the allowed list (no <p>, <br>, <h3>, <div>,
                  <span>, <b>, <i>, <table>). Separate paragraphs with allowed block tags,
                  never <br> or blank lines.

            Stop after writing the file(s). The workflow publishes them in the next steps.
          claude_args: |
            --allowedTools "Bash(gh pr view:*),Bash(gh pr diff:*),Bash(git diff:*),Bash(git log:*),Read,Write,Glob,Grep"

      - name: Publish plan to Asana subtask
        id: asana
        if: ${{ inputs.asana_gid != '' }}
        env:
          ASANA_TOKEN: ${{ secrets.asana_token }}
          PARENT: ${{ inputs.asana_gid }}
        run: |
          set -uo pipefail
          subtask_name="🤖 QA Test Plan (auto-generated)"

          # Find an existing auto subtask (match by name).
          existing=$(curl -s -H "Authorization: Bearer $ASANA_TOKEN" \
            "https://app.asana.com/api/1.0/tasks/$PARENT/subtasks?opt_fields=name" \
            | jq -r '[.data[] | select(.name | contains("QA Test Plan (auto-generated)"))] | first | .gid // empty')

          # Send a payload file to Asana — PUT if updating an existing subtask, POST to create.
          send() {
            if [ -n "$existing" ]; then
              curl -s -w '\n%{http_code}' -X PUT -H "Authorization: Bearer $ASANA_TOKEN" \
                -H "Content-Type: application/json" -d @"$1" \
                "https://app.asana.com/api/1.0/tasks/$existing?opt_fields=permalink_url"
            else
              curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $ASANA_TOKEN" \
                -H "Content-Type: application/json" -d @"$1" \
                "https://app.asana.com/api/1.0/tasks/$PARENT/subtasks?opt_fields=permalink_url"
            fi
          }

          url=""
          # Attempt 1: rich html_notes (Asana requires strict, well-formed XHTML).
          if [ -s /tmp/test-plan.html ]; then
            jq -n --arg name "$subtask_name" --rawfile notes /tmp/test-plan.html \
              '{data:{name:$name, html_notes:$notes}}' > /tmp/asana-payload.json
            resp=$(send /tmp/asana-payload.json)
            code=$(printf '%s' "$resp" | tail -n1)
            body=$(printf '%s' "$resp" | sed '$d')
            echo "Asana html_notes write HTTP status: $code"
            url=$(printf '%s' "$body" | jq -r '.data.permalink_url // empty')
            [ -z "$url" ] && printf 'Asana error body: %s\n' "$body"
          fi

          # Attempt 2 (fallback): plain-text notes from the Markdown — never fails XML parsing.
          if [ -z "$url" ] && [ -s /tmp/test-plan.md ]; then
            echo "::warning::Rich HTML rejected or missing; retrying with plain-text notes."
            jq -n --arg name "$subtask_name" --rawfile notes /tmp/test-plan.md \
              '{data:{name:$name, notes:$notes}}' > /tmp/asana-payload-plain.json
            resp=$(send /tmp/asana-payload-plain.json)
            code=$(printf '%s' "$resp" | tail -n1)
            body=$(printf '%s' "$resp" | sed '$d')
            echo "Asana plain-notes write HTTP status: $code"
            url=$(printf '%s' "$body" | jq -r '.data.permalink_url // empty')
            [ -z "$url" ] && printf 'Asana error body: %s\n' "$body"
          fi

          if [ -n "$url" ]; then
            echo "subtask_url=$url" >> "$GITHUB_OUTPUT"
            echo "✅ Test plan written to Asana subtask: $url" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::Asana write failed; full plan will be posted on the PR instead."
            echo "⚠️ Asana write failed — full plan posted on the PR instead." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Post PR comment
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ inputs.pr_number }}
          SUBTASK_URL: ${{ steps.asana.outputs.subtask_url }}
        run: |
          set -uo pipefail
          marker="<!-- claude-test-plan -->"
          if [ -n "${SUBTASK_URL:-}" ]; then
            # CASE A success: PR gets a short pointer to the Asana subtask.
            {
              printf '🤖 **QA test plan generated** and added to the Asana task as a subtask:\n'
              printf '**[🤖 QA Test Plan (auto-generated)](%s)**\n\n' "$SUBTASK_URL"
              printf 'Review it there before handing the task off to QA.\n\n'
              printf '%s\n' "$marker"
            } > /tmp/pr-comment.md
          else
            # CASE B (or Asana fallback): post the full plan on the PR.
            if [ ! -s /tmp/test-plan.md ]; then
              echo "::error::No /tmp/test-plan.md produced and no Asana subtask; nothing to post."
              exit 1
            fi
            cp /tmp/test-plan.md /tmp/pr-comment.md
            grep -qF "$marker" /tmp/pr-comment.md || printf '\n%s\n' "$marker" >> /tmp/pr-comment.md
          fi
          existing=$(gh api "repos/$REPO/issues/$PR/comments" --paginate \
            --jq "[.[] | select(.body | contains(\"$marker\"))] | first | .id // empty")
          if [ -n "$existing" ]; then
            echo "Updating existing PR comment $existing"
            gh api --method PATCH "repos/$REPO/issues/comments/$existing" -F body=@/tmp/pr-comment.md >/dev/null
          else
            echo "Creating new PR comment"
            gh pr comment "$PR" --repo "$REPO" --body-file /tmp/pr-comment.md
          fi
